<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Hermes Console v0.13.4</title>
<style>
body{font-family:system-ui;background:#f8fafc;margin:0;padding:16px;color:#111827}
.card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.05);margin-bottom:12px}
h2{margin:0 0 10px;color:#2563eb;font-size:16px}
textarea{width:100%;min-height:90px;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font-family:monospace;resize:vertical;box-sizing:border-box}
button{background:#2563eb;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;margin-top:6px}
button:hover{background:#1d4ed8}button:disabled{opacity:.5}
.badge{padding:2px 6px;border-radius:3px;font-size:11px;font-weight:bold;color:#fff}
.s{background:#10b981}.f{background:#ef4444}.r{background:#f59e0b}
.record{border-bottom:1px solid #e5e7eb;padding:12px 0}
.record:last-child{border:none}
.record-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tabs{display:flex;gap:6px;margin-bottom:8px}
.tab{background:#f1f5f9;border:1px solid #cbd5e1;padding:4px 12px;font-size:12px;border-radius:4px;cursor:pointer;transition:0.15s}
.tab:hover{background:#e2e8f0}.tab.active{background:#2563eb;color:#fff;border-color:#2563eb}
.preview{background:#fafafa;border:1px solid #e2e8f0;padding:10px;border-radius:6px;max-height:220px;overflow:auto;font-size:12px;white-space:pre-wrap;margin-bottom:8px;min-height:60px;line-height:1.5}
.actions{display:flex;gap:6px}
.act-btn{background:#fff;border:1px solid #94a3b8;padding:4px 10px;font-size:11px;border-radius:4px;cursor:pointer;transition:0.15s}
.act-btn:hover{background:#f8fafc}
</style></head>
<body>
<div class="card"><h2>🚀 触发工作流</h2><textarea id="txt" placeholder="粘贴晨读/策划内容..."></textarea>
<button id="btn" onclick="go()">▶ 启动</button><div id="st" style="margin-top:6px;font-size:12px;color:#64748b"></div></div>
<div class="card" style="display:flex;justify-content:space-between;align-items:center"><h2 style="margin:0">📜 预览工作台 (v0.13.4)</h2>
<button style="background:#fff;color:#2563eb;border:1px solid #2563eb" onclick="load()">🔄 刷新</button></div>
<div class="card" style="padding-top:0"><div id="list"><p style="color:#94a3b8;font-size:12px">加载中...</p></div></div>

<script>
window.runsData = {};
window.activeTabs = {};

async function go() {
  const b = document.getElementById('btn'), t = document.getElementById('txt').value;
  if (!t.trim()) return alert('请输入内容');
  b.disabled = true; b.textContent = '⏳ 处理中...';
  document.getElementById('st').innerHTML = '<span style="color:#2563eb">冷启动约30s...</span>';
  try {
    const r = await fetch('/api/v1/trigger', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: t }) });
    const d = await r.json();
    document.getElementById('st').innerHTML = `<span class="badge ${d.status==='success'?'s':(d.status==='failed'?'f':'r')}">${d.status.toUpperCase()}</span> ${d.elapsed_sec}s`;
    load();
  } catch (e) { document.getElementById('st').innerText = '❌ 请求失败'; }
  finally { b.disabled = false; b.textContent = '▶ 启动'; }
}

async function load() {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '<p style="color:#94a3b8;font-size:12px">同步中...</p>';
  try {
    const r = await fetch('/api/v1/runs?t=' + Date.now());
    const data = await r.json();
    if (!data.runs?.length) { listEl.innerHTML = '<p style="color:#94a3b8;font-size:12px">暂无记录</p>'; return; }
    listEl.innerHTML = '';
    window.runsData = {};
    window.activeTabs = {};

    data.runs.forEach(run => {
      window.runsData[run.run_id] = run;
      window.activeTabs[run.run_id] = 'douyin';

      const el = document.createElement('div');
      el.className = 'record';
      el.dataset.runId = run.run_id;

      // 1. Header
      const hdr = document.createElement('div');
      hdr.className = 'record-header';
      hdr.innerHTML = `<span class="badge ${run.status==='success'?'s':(run.status==='failed'?'f':'r')}">${run.status.toUpperCase()}</span><span style="font-size:12px;color:#64748b">${run.run_id} (${run.elapsed_sec}s)</span>`;
      el.appendChild(hdr);

      // 2. Tabs
      const tabs = document.createElement('div');
      tabs.className = 'tabs';
      ['douyin','oa','video'].forEach(type => {
        const btn = document.createElement('button');
        btn.className = `tab ${type==='douyin'?'active':''}`;
        btn.textContent = {douyin:'📱 抖音稿', oa:'📄 公众号', video:'🎬 分镜表'}[type];
        btn.dataset.type = type;
        btn.onclick = () => switchTab(run.run_id, type);
        tabs.appendChild(btn);
      });
      el.appendChild(tabs);

      // 3. Preview (安全直写，避开 getElementById 竞态)
      const f = run.formatter_output || {};
      const initialContent = f.douyin_script || '(该模块未生成内容)';
      const preview = document.createElement('div');
      preview.className = 'preview';
      preview.textContent = initialContent;
      el.appendChild(preview);

      // 4. Actions
      const acts = document.createElement('div');
      acts.className = 'actions';
      const copyBtn = document.createElement('button');
      copyBtn.className = 'act-btn'; copyBtn.textContent = '📋 复制内容';
      copyBtn.onclick = () => copyToClipboard(run.run_id);
      const dlBtn = document.createElement('button');
      dlBtn.className = 'act-btn'; dlBtn.textContent = '⬇️ 下载文件';
      dlBtn.onclick = () => triggerDownload(run.run_id);
      acts.appendChild(copyBtn); acts.appendChild(dlBtn);
      el.appendChild(acts);

      listEl.appendChild(el); // ⚠️ 必须先挂载 DOM，再绑定后续交互
    });
  } catch (e) { listEl.innerHTML = `<p style="color:#ef4444;font-size:12px">加载失败: ${e.message}</p>`; }
}

function switchTab(runId, type) {
  window.activeTabs[runId] = type;
  const record = document.querySelector(`[data-run-id="${runId}"]`);
  if (!record) return;
  
  // 切换 Tab 样式
  record.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  
  // 切换预览内容
  const preview = record.querySelector('.preview');
  const run = window.runsData[runId];
  const f = run.formatter_output || {};
  let content = '(该模块未生成内容)';
  if (type === 'douyin') content = f.douyin_script || content;
  else if (type === 'oa') content = f.oa_long_article || content;
  else if (type === 'video') content = f.video_short ? JSON.stringify(f.video_short, null, 2) : content;
  preview.textContent = content;
}

async function copyToClipboard(runId) {
  const type = window.activeTabs[runId];
  const run = window.runsData[runId];
  if (!run) return;
  const f = run.formatter_output || {};
  let content = type === 'douyin' ? f.douyin_script : (type === 'oa' ? f.oa_long_article : JSON.stringify(f.video_short||[], null, 2));
  if (!content) return alert('无内容可复制');
  try {
    await navigator.clipboard.writeText(content);
    alert('✅ 已复制到剪贴板，可直接粘贴至 Obsidian/平台后台');
  } catch { alert('❌ 浏览器限制，请手动选中文本 Ctrl+C'); }
}

function triggerDownload(runId) {
  const type = window.activeTabs[runId];
  const run = window.runsData[runId];
  if (!run) return;
  const f = run.formatter_output || {};
  let content = '', ext = 'md', label = '';
  if (type === 'douyin') { content = f.douyin_script; label = '抖音口播稿'; }
  else if (type === 'oa') { content = f.oa_long_article; label = '公众号长文'; }
  else if (type === 'video') { content = JSON.stringify(f.video_short||[], null, 2); ext = 'json'; label = '分镜表'; }
  if (!content) return alert('无内容可下载');
  
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${runId}_${label}.${ext}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
window.onload = load;
</script></body></html>
