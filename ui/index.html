<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent Console v0.13.0</title>
<style>
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f7fa;margin:0;padding:20px;color:#1a1a1a}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:20px}
h2{margin:0 0 15px;color:#0f62fe;font-size:18px}
textarea{width:100%;min-height:120px;padding:12px;border:1px solid #d0d5dd;border-radius:8px;font-family:monospace;resize:vertical;box-sizing:border-box}
button{background:#0f62fe;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:500;margin-top:10px;transition:0.2s}
button:hover{background:#0353a9}button:disabled{opacity:0.5;cursor:not-allowed}
.run-item{border-bottom:1px solid #eee;padding:12px 0;cursor:pointer}
.run-item:last-child{border:none}
.badge{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:bold;color:#fff}
.success{background:#0ea5e9} .failed{background:#ef4444} .running{background:#f59e0b}
pre{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;overflow:auto;max-height:350px;font-size:12px;margin:10px 0 0;display:none;white-space:pre-wrap;word-break:break-all}
.toggle-btn{background:transparent;color:#0f62fe;border:1px solid #0f62fe;padding:4px 10px;font-size:11px;border-radius:6px;margin-left:8px}
.toggle-btn:hover{background:#eff6ff}
</style></head>
<body>
<div class="card"><h2>🚀 Hermes Agent 控制台</h2>
<label>输入晨读/策划文本：</label><textarea id="inputText" placeholder="在此粘贴原始内容..."></textarea>
<button id="runBtn" onclick="triggerRun()">▶ 启动工作流</button>
<div id="status" style="margin-top:12px;color:#666;font-size:14px"></div></div>

<div class="card"><h2>📜 最近运行记录（点击展开完整 JSON）</h2><div id="runsList"><p style="color:#999">暂无记录</p></div></div>

<script>
async function triggerRun(){
  const btn=document.getElementById('runBtn');const txt=document.getElementById('inputText').value;
  if(!txt.trim()){alert('请输入内容');return}
  btn.disabled=true;btn.textContent='⏳ 执行中...';
  document.getElementById('status').innerHTML='<span style="color:#0f62fe">正在连接云端 Agent 团队，冷启动约30s...</span>';
  try{
    const res=await fetch('/api/v1/trigger',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt})});
    const data=await res.json();
    const badge=data.status==='success'?'success':(data.status==='running'?'running':'failed');
    document.getElementById('status').innerHTML=`<span class="badge ${badge}">${data.status.toUpperCase()}</span> 耗时: ${data.elapsed_sec}s | ID: ${data.run_id}`;
    if(data.files_exported?.length) document.getElementById('status').innerHTML+=`<br>📁 已生成: ${data.files_exported.join(' | ')}`;
    if(data.error) document.getElementById('status').innerHTML+=`<br><span style="color:#ef4444">❌ ${data.error}</span>`;
    loadRuns();
  }catch(e){document.getElementById('status').innerText='❌ 请求失败，请检查网络或网关状态';}
  finally{btn.disabled=false;btn.textContent='▶ 启动工作流';}
}

function toggleJson(id){
  const el=document.getElementById('json-'+id);
  el.style.display=el.style.display==='none'?'block':'none';
}

async function loadRuns(){
  try{
    const res=await fetch('/api/v1/runs');const data=await res.json();
    const list=document.getElementById('runsList');
    if(!data.runs?.length){list.innerHTML='<p style="color:#999">暂无记录</p>';return}
    list.innerHTML=data.runs.map(r=>`
      <div class="run-item">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <strong style="font-size:14px">${r.run_id}</strong>
          <div>
            <span class="badge ${r.status==='success'?'success':(r.status==='failed'?'failed':'running')}">${r.status.toUpperCase()}</span>
            <span style="font-size:12px;color:#666;margin-left:6px">${r.elapsed_sec}s</span>
            <button class="toggle-btn" onclick="event.stopPropagation();toggleJson('${r.run_id}')">🔍 查看完整 JSON</button>
          </div>
        </div>
        ${r.error?`<div style="color:#ef4444;font-size:12px;margin-top:4px">❌ ${r.error}</div>`:''}
        ${r.files_exported?.length?`<div style="font-size:12px;color:#0f62fe;margin-top:4px">📁 ${r.files_exported.join(' | ')}</div>`:''}
        <pre id="json-${r.run_id}">${JSON.stringify(r,null,2)}</pre>
      </div>
    `).join('');
  }catch(e){console.error(e)}
}
loadRuns();setInterval(loadRuns,5000);
</script></body></html>
